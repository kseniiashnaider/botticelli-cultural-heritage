name: Cleanup branch preview

on:
  delete:
    branches:
      - '**'

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  cleanup:
    if: >-
      github.event.ref != 'refs/heads/main' &&
      github.event.ref != 'refs/heads/master' &&
      github.event.ref != 'refs/heads/gh-pages'
    runs-on: ubuntu-latest
    steps:
      - name: Sanitize branch name
        id: branch
        run: |
          NAME="${GITHUB_EVENT_REF#refs/heads/}"
          SANITIZED=$(echo "$NAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
          echo "sanitized=$SANITIZED" >> "$GITHUB_OUTPUT"

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          rm -rf "preview/${{ steps.branch.outputs.sanitized }}"

      - name: Regenerate previews index
        run: |
          mkdir -p preview
          {
            echo '<!DOCTYPE html>'
            echo '<html lang="en">'
            echo '<head>'
            echo '<meta charset="UTF-8">'
            echo '<meta name="viewport" content="width=device-width, initial-scale=1.0">'
            echo '<title>Branch previews</title>'
            echo '<style>'
            echo 'body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }'
            echo 'a { color: #a8864a; }'
            echo '</style>'
            echo '</head>'
            echo '<body>'
            echo '<h1>Branch previews</h1>'
            echo '<p>Production site: <a href="../">main</a></p>'
            echo '<ul>'
            for dir in preview/*/; do
              [ -d "$dir" ] || continue
              name=$(basename "$dir")
              echo "<li><a href=\"./${name}/\">${name}</a></li>"
            done
            echo '</ul>'
            echo '</body>'
            echo '</html>'
          } > preview/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Remove preview for deleted branch ${{ steps.branch.outputs.sanitized }}"
          git push
